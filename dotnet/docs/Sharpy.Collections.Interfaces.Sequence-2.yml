  assemblies:
  - Sharpy
  namespace: Sharpy.Collections.Interfaces
  summary: >-
    Returns the sub-sequence at the given start and end (exclusive)

    indices in the sequence, skipping every step elements after the

    start. Supports negative indices to count from the back. If either

    index is out of range, then this raises an

    <xref href="Sharpy.IndexError" data-throw-if-not-resolved="false"></xref>. If the step is less than 1, then an

    empty sequence is returned.
  remarks: Should call <xref href="Sharpy.Collections.Interfaces.Sequence%602.__GetItem__(Sharpy.Slice)" data-throw-if-not-resolved="false"></xref> underneath.
  example: []
  syntax:
    content: S this[int start, int end, int step] { get; }
    parameters:
    - id: start
      type: System.Int32
    - id: end
      type: System.Int32
    - id: step
      type: System.Int32
    return:
      type: '{S}'
    content.vb: ReadOnly Default Property this[](start As Integer, [end] As Integer, [step] As Integer) As S
  overload: Sharpy.Collections.Interfaces.Sequence`2.Item*
