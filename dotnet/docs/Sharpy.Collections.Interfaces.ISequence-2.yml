  assemblies:
  - Sharpy
  namespace: Sharpy.Collections.Interfaces
  summary: >-
    Returns the sub-sequence at the given start and end (exclusive) indices

    in the sequence. Supports negative indices to count from the back.

    If either index is out of range, then this raises an

    <xref href="Sharpy.IndexError" data-throw-if-not-resolved="false"></xref>.
  remarks: Should call <xref href="Sharpy.Collections.Interfaces.ISequence%602.__GetItem__(Sharpy.Slice)" data-throw-if-not-resolved="false"></xref> underneath.
  example: []
  syntax:
    content: TSequence this[int start, int end] { get; }
    parameters:
    - id: start
      type: System.Int32
    - id: end
      type: System.Int32
    return:
      type: '{TSequence}'
    content.vb: ReadOnly Default Property this[](start As Integer, [end] As Integer) As TSequence
