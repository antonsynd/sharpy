  assemblies:
  - Sharpy
  namespace: Sharpy
  summary: >-
    This interface defines objects that can be checked for equality via

    the <code>__Eq__</code> method. Equality in Sharpy is not the same as

    reference equality (except for <xref href="Sharpy.Object" data-throw-if-not-resolved="false"></xref>). All Sharpy

    objects implement this interface. This is the non-generic version of

    the <xref href="Sharpy.IEquatable%601" data-throw-if-not-resolved="false"></xref> interface.
  example: []
  syntax:
    content: 'public interface IEquatable : IHashable'
    content.vb: Public Interface IEquatable Inherits IHashable
  inheritedMembers:
  - Sharpy.IHashable.__Hash__
