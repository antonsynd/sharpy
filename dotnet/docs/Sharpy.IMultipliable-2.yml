  namespace: Sharpy
  summary: >-
    An interface for a type (the multiplicand) that can be multiplied with

    something (the multiplier) producing a result (the product) with native

    operator support, where the result is of the same type as the multiplicand.
  example: []
  syntax:
    content: 'public interface IMultipliable<TMultiplicand, TMultipilier> : IMultipliable<TMultiplicand, TMultipilier, TMultiplicand>, IMultipliableWith<TMultipilier, TMultiplicand> where TMultiplicand : IMultipliable<TMultiplicand, TMultipilier, TMultiplicand>'
