  summary: >-
    An interface for a type (the multiplicand) that can be multiplied with

    something (the multiplier) producing a result (the product) with native

    operator support.
  example: []
  syntax:
    content: 'public interface IMultipliable<TMultiplicand, TMultiplier, TProduct> : IMultipliableWith<TMultiplier, TProduct> where TMultiplicand : IMultipliable<TMultiplicand, TMultiplier, TProduct>'
    typeParameters:
