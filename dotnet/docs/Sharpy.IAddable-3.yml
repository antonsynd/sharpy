  assemblies:
  - Sharpy
  namespace: Sharpy
  summary: >-
    An interface for a type (the augend) that can be augmented (or added to)

    with something (the addende) producing a sum (the result, which may be

    the modified augend itself. This version has native operator support.
  example: []
  syntax:
    content: 'public interface IAddable<TAugend, TAddend, TSum> : IAddableWith<TAddend, TSum> where TAugend : IAddable<TAugend, TAddend, TSum>'
    typeParameters:
    - id: TAugend
      description: >-
        The augend (the thing to add something to, or the
            thing that is increased or augmented).
    - id: TAddend
      description: >-
        The addend (the increase or thing to
            add/insert).
    - id: TSum
      description: The sum.
    content.vb: Public Interface IAddable(Of TAugend As IAddable(Of TAugend, TAddend, TSum), TAddend, TSum) Inherits IAddableWith(Of TAddend, TSum)
