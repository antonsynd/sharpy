  assemblies:
  - Sharpy
  namespace: Sharpy
  summary: >-
    An interface defining an augmentation operator, where the left operand

    is the element to be augmented (increased) and the right operand is the

    amount of augumentation or something to be included in the other element.
  example: []
  syntax:
    content: 'public interface IAddable<TAugend, TAddend> where TAugend : IAddable<TAugend, TAddend>'
    typeParameters:
    - id: TAugend
      description: >-
        The type that gets augmented
            (the "augend").
    - id: TAddend
      description: >-
        The type that indicates the amount of
            augmentation or what is being included in the "augend".
    content.vb: Public Interface IAddable(Of TAugend As IAddable(Of TAugend, TAddend), TAddend)
