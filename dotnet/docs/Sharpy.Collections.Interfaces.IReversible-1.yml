  summary: >-
    Called (if present) by the Reversed(IReversible&lt;T&gt;) built-in to

    implement reverse iteration. It should return a new

    <xref href="Sharpy.Iterator%601" data-throw-if-not-resolved="false"></xref> that iterates over all the objects in the

    container in reverse order.
  example: []
  syntax:
