  assemblies:
  - Sharpy
  namespace: Sharpy
  summary: >-
    An object representing a stream of data. Repeated calls to the

    iterator’s <xref href="Sharpy.Iterator%601.__Next__" data-throw-if-not-resolved="false"></xref> method (or passing it to the

    built-in function Next(Iterator&lt;T&gt;)) return successive items in the

    stream. When no more data are available, a <xref href="Sharpy.StopIteration" data-throw-if-not-resolved="false"></xref>

    exception is raised instead. At this point, the iterator object is

    exhausted and any further calls to its <xref href="Sharpy.Iterator%601.__Next__" data-throw-if-not-resolved="false"></xref> method

    just raise <xref href="Sharpy.StopIteration" data-throw-if-not-resolved="false"></xref> again.
  remarks: >-
    Iterators are required to have an <xref href="Sharpy.Iterator%601.__Iter__" data-throw-if-not-resolved="false"></xref> method that

    returns the iterator object itself so every iterator is also iterable

    and may be used in most places where other iterables are accepted. One

    notable exception is code which attempts multiple iteration passes. A

    container object (such as a list) produces a fresh new iterator each

    time you pass it to the Iter(Iterable&lt;T&gt;) function or use it in a

    <code>for</code> loop. Attempting this with an iterator will just return the

    same exhausted iterator object used in the previous iteration pass,

    making it appear like an empty container.
  example: []
  syntax:
    content: 'public abstract class Iterator<T> : Iterable<T>, IEnumerable<T>, IEnumerable'
    typeParameters:
    - id: T
    content.vb: Public MustInherit Class Iterator(Of T) Implements Iterable(Of T), IEnumerable(Of T), IEnumerable
