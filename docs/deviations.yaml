  - id: integer-division-floor
    code: null
    category: operators
    audience: python
    severity: none
    python_behavior: "`a // b` for ints is floor division: `-7 // 2 == -4`."
    sharpy_behavior: "`//` is lowered to truncating C# integer division by default; use `math.floor_div(a, b)` to match Python's flooring semantics for negatives."
    spec_ref: docs/language_specification/arithmetic_operators.md
    existing_diagnostic: null
    planned_diagnostic: null
    example:
      python: |
        -7 // 2   # -4 (floor)
      sharpy: |
        -7 // 2                 # -3 (C# truncating semantics)
        math.floor_div(-7, 2)   # -4 (matches Python)

  - id: string-indexing-utf16
    code: null
    category: stdlib
    audience: python
    severity: none
    python_behavior: "`s[i]` indexes by Unicode code point."
    sharpy_behavior: "`s[i]` indexes by UTF-16 code unit; multi-code-unit characters require surrogate-pair handling."
    spec_ref: docs/language_specification/string_type.md
    existing_diagnostic: null
    planned_diagnostic: SPY0470
    example:
      python: |
        "café"[3]    # 'é'
      sharpy: |
