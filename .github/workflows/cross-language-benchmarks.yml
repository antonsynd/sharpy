# Weekly cross-language benchmark: Sharpy vs C# vs Python
# Runs equivalent programs, commits results to benchmarks/cross-language/results/

name: Cross-Language Benchmarks

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        ref: dev

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build Sharpy CLI (Release)
      run: dotnet build src/Sharpy.Cli -c Release --nologo -v q

    - name: Run cross-language benchmarks
      run: |
        python3 benchmarks/cross-language/run_benchmarks.py --json > benchmarks/cross-language/results/latest.json

    - name: Generate markdown report
      run: |
        python3 - <<'SCRIPT'
        import json
        from datetime import datetime, timezone

        with open("benchmarks/cross-language/results/latest.json") as f:
            results = json.load(f)

        now = datetime.now(timezone.utc).strftime("%Y-%m-%d")

        # Group by benchmark
        benchmarks = {}
        for r in results:
            benchmarks.setdefault(r["name"], {})[r["language"]] = r

        # Write markdown report
        lines = [
            f"# Cross-Language Benchmark Results ({now})",
            "",
            f"**Runner:** `ubuntu-latest` | **Python:** 3.12 | **.NET:** 10.0",
            "",
            "| Benchmark | Python | Sharpy | C# | Spy/Py | Spy/C# |",
            "|-----------|--------|--------|-----|--------|--------|",
        ]

        for name in sorted(benchmarks):
            langs = benchmarks[name]
            py = langs.get("Python", {})
            spy = langs.get("Sharpy", {})
            cs = langs.get("C#", {})

            def fmt(r):
                if not r or not r.get("success"):
                    return "FAIL"
                s = r["elapsed_seconds"]
                if s < 1.0:
                    return f"{s*1000:.0f}ms"
                return f"{s:.2f}s"

            py_t = py.get("elapsed_seconds", 0) if py.get("success") else 0
            spy_t = spy.get("elapsed_seconds", 0) if spy.get("success") else 0
            cs_t = cs.get("elapsed_seconds", 0) if cs.get("success") else 0

            ratio_py = f"{spy_t/py_t:.2f}x" if py_t > 0 and spy_t > 0 else "—"
            ratio_cs = f"{spy_t/cs_t:.2f}x" if cs_t > 0 and spy_t > 0 else "—"

            lines.append(f"| {name} | {fmt(py)} | {fmt(spy)} | {fmt(cs)} | {ratio_py} | {ratio_cs} |")

        lines += [
            "",
            "> **Spy/Py < 1.0** = Sharpy faster than Python. "
            "**Spy/C# ≈ 1.0** = minimal overhead vs hand-written C#.",
            "",
            "---",
            f"*Generated by CI on {now}*",
            "",
        ]

        with open("benchmarks/cross-language/results/latest.md", "w") as f:
            f.write("\n".join(lines))

        # Append to history
        history_file = "benchmarks/cross-language/results/history.json"
        try:
            with open(history_file) as f:
                history = json.load(f)
        except (FileNotFoundError, json.JSONDecodeError):
            history = []

        history.append({"date": now, "results": results})

        # Keep last 52 weeks
        history = history[-52:]

        with open(history_file, "w") as f:
            json.dump(history, f, indent=2)
            f.write("\n")

        SCRIPT

    - name: Commit results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add benchmarks/cross-language/results/
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "bench: weekly cross-language benchmark results $(date -u +%Y-%m-%d)"
          git push
        fi
