# Weekly cross-language benchmark: Sharpy vs C# vs Python
# Two-job design: C# benchmarks run in a clean environment (no Sharpy in NuGet
# cache), then Python/Sharpy benchmarks run after building the Sharpy CLI.
# Results are merged into a single report.

name: Cross-Language Benchmarks

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  # Job 1: Run C# benchmarks in a clean environment before any Sharpy build
  # contaminates the NuGet global packages cache with Sharpy.Core.
  benchmark-csharp:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        ref: dev

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Run C# benchmarks
      run: |
        python3 benchmarks/cross-language/run_benchmarks.py --languages C# --json > csharp-results.json

    - name: Upload C# results
      uses: actions/upload-artifact@v7
      with:
        name: csharp-results
        path: csharp-results.json
        retention-days: 1

  # Job 2: Build Sharpy CLI, run Python + Sharpy benchmarks, merge all results.
  benchmark:
    needs: benchmark-csharp
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        ref: dev

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Download C# results
      uses: actions/download-artifact@v8
      with:
        name: csharp-results

    - name: Build Sharpy CLI (Release)
      run: dotnet build src/Sharpy.Cli -c Release --nologo -v q

    - name: Run Python + Sharpy benchmarks and merge
      run: |
        python3 benchmarks/cross-language/run_benchmarks.py --languages Python,Sharpy --merge csharp-results.json --json > benchmarks/cross-language/results/latest.json

    - name: Generate markdown report
      run: |
        python3 - <<'SCRIPT'
        import json
        from datetime import datetime, timezone

        with open("benchmarks/cross-language/results/latest.json") as f:
            results = json.load(f)

        now = datetime.now(timezone.utc).strftime("%Y-%m-%d")

        # Group by benchmark
        benchmarks = {}
        for r in results:
            benchmarks.setdefault(r["name"], {})[r["language"]] = r

        def fmt(seconds):
            if seconds == 0:
                return "—"
            if seconds < 0.001:
                return f"{seconds*1_000_000:.0f}us"
            if seconds < 1.0:
                return f"{seconds*1000:.0f}ms"
            return f"{seconds:.2f}s"

        def ratio(a, b):
            if a > 0 and b > 0:
                return f"{a/b:.2f}x"
            return "—"

        # Execution time table
        lines = [
            f"# Cross-Language Benchmark Results ({now})",
            "",
            f"**Runner:** `ubuntu-latest` | **Python:** 3.12 | **.NET:** 10.0 | "
            f"**Runs:** 3 (median) + warmup",
            "",
            "## Execution Time (runtime only)",
            "",
            "| Benchmark | Python | Sharpy | C# | Spy/Py | Spy/C# |",
            "|-----------|--------|--------|-----|--------|--------|",
        ]

        for name in sorted(benchmarks):
            langs = benchmarks[name]
            py = langs.get("Python", {})
            spy = langs.get("Sharpy", {})
            cs = langs.get("C#", {})

            py_t = py.get("execute_seconds", 0) if py.get("success") else 0
            spy_t = spy.get("execute_seconds", 0) if spy.get("success") else 0
            cs_t = cs.get("execute_seconds", 0) if cs.get("success") else 0

            py_s = fmt(py_t) if py.get("success") else "FAIL"
            spy_s = fmt(spy_t) if spy.get("success") else "FAIL"
            cs_s = fmt(cs_t) if cs.get("success") else "FAIL"

            lines.append(f"| {name} | {py_s} | {spy_s} | {cs_s} | {ratio(spy_t, py_t)} | {ratio(spy_t, cs_t)} |")

        # Compilation time table
        lines += [
            "",
            "## Compilation Time",
            "",
            "| Benchmark | Python (.pyc) | Sharpy (.spy→C#) | C# (dotnet build) | Spy/C# |",
            "|-----------|---------------|------------------|-------------------|--------|",
        ]

        for name in sorted(benchmarks):
            langs = benchmarks[name]
            py = langs.get("Python", {})
            spy = langs.get("Sharpy", {})
            cs = langs.get("C#", {})

            py_t = py.get("compile_seconds", 0)
            spy_t = spy.get("compile_seconds", 0)
            cs_t = cs.get("compile_seconds", 0)

            lines.append(f"| {name} | {fmt(py_t)} | {fmt(spy_t)} | {fmt(cs_t)} | {ratio(spy_t, cs_t)} |")

        lines += [
            "",
            "> **Spy/Py < 1.0** = Sharpy execution faster than Python. "
            "**Spy/C# ≈ 1.0** = minimal overhead vs hand-written C#.",
            "",
            "---",
            f"*Generated by CI on {now}*",
            "",
        ]

        with open("benchmarks/cross-language/results/latest.md", "w") as f:
            f.write("\n".join(lines))

        # Append to history
        history_file = "benchmarks/cross-language/results/history.json"
        try:
            with open(history_file) as f:
                history = json.load(f)
        except (FileNotFoundError, json.JSONDecodeError):
            history = []

        history.append({"date": now, "results": results})

        # Keep last 52 weeks
        history = history[-52:]

        with open(history_file, "w") as f:
            json.dump(history, f, indent=2)
            f.write("\n")

        SCRIPT

    - name: Post to job summary
      run: |
        echo "## Cross-Language Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat benchmarks/cross-language/results/latest.md >> $GITHUB_STEP_SUMMARY

    - name: Commit results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add benchmarks/cross-language/results/
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "bench: weekly cross-language benchmark results $(date -u +%Y-%m-%d)"
          git pull --rebase origin dev || true
          git push
        fi
