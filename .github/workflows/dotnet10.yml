# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET 10

on:
  push:
    branches: [ "mainline" ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'samples/**'
      - 'build_tools/**'
      - 'dogfood_output/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [ "mainline" ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'samples/**'
      - 'build_tools/**'
      - 'dogfood_output/**'
      - '*.md'
      - 'LICENSE'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal --filter "Category!=Benchmark"
    - name: Verify .spy stdlib native compilation
      run: dotnet run --project src/Sharpy.Cli -- project src/Sharpy.Stdlib/spy/stdlib.spyproj
    - name: Verify .spy stdlib C# staleness
      run: bash build_tools/check_spy_staleness.sh
