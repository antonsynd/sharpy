# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET 10

on:
  push:
    branches: [ "mainline" ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'samples/**'
      - 'build_tools/**'
      - 'dogfood_output/**'
      - 'editors/**'
      - 'benchmarks/**'
      - 'site/**'
      - '.claude/**'
      - '.vscode/**'
      - '.github/agents/**'
      - '.github/instructions/**'
      - '*.md'
      - 'LICENSE'
      - 'mkdocs.yml'
      - 'chiri_config.json5'
  pull_request:
    branches: [ "mainline" ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'samples/**'
      - 'build_tools/**'
      - 'dogfood_output/**'
      - 'editors/**'
      - 'benchmarks/**'
      - 'site/**'
      - '.claude/**'
      - '.vscode/**'
      - '.github/agents/**'
      - '.github/instructions/**'
      - '*.md'
      - 'LICENSE'
      - 'mkdocs.yml'
      - 'chiri_config.json5'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Verify all test projects are covered
      run: |
        # Fail CI if a test project exists in src/ but isn't listed below
        known="Sharpy.Cli.Tests Sharpy.Compiler.Tests Sharpy.Core.Tests Sharpy.Lsp.Tests Sharpy.Stdlib.Tests"
        found=$(find src -maxdepth 1 -name "*.Tests" -type d -printf '%f\n' | sort | tr '\n' ' ' | sed 's/ $//')
        if [ "$found" != "$known" ]; then
          echo "::error::Test project drift detected. Expected: [$known] Found: [$found]"
          echo "Update the test steps in .github/workflows/dotnet10.yml"
          exit 1
        fi
    - name: Test CLI
      run: dotnet test src/Sharpy.Cli.Tests --no-build --verbosity normal --filter "Category!=Benchmark"
    - name: Test Core
      run: dotnet test src/Sharpy.Core.Tests --no-build --verbosity normal --filter "Category!=Benchmark"
    - name: Test Compiler
      run: dotnet test src/Sharpy.Compiler.Tests --no-build --verbosity normal --filter "Category!=Benchmark"
    - name: Test Stdlib
      run: dotnet test src/Sharpy.Stdlib.Tests --no-build --verbosity normal --filter "Category!=Benchmark"
    - name: Test LSP
      run: dotnet test src/Sharpy.Lsp.Tests --no-build --verbosity normal --filter "Category!=Benchmark"
    - name: Verify .spy stdlib native compilation
      run: dotnet run --project src/Sharpy.Cli -- project src/Sharpy.Stdlib/spy/stdlib.spyproj
    - name: Verify .spy stdlib C# staleness
      run: bash build_tools/check_spy_staleness.sh
    - name: Verify .spy test C# staleness
      run: bash build_tools/check_spy_tests_staleness.sh
    - name: Log per-module stdlib assembly sizes
      run: |
        echo "=== Per-module stdlib assembly sizes (net10.0) ==="
        find src/Sharpy.Stdlib/modules/bin -name "Sharpy.Stdlib.*.dll" -path "*/net10.0/*" \
          | sort \
          | while read f; do
              size=$(stat --format="%s" "$f" 2>/dev/null || stat -f "%z" "$f" 2>/dev/null)
              printf "  %-40s %s bytes\n" "$(basename "$f")" "$size"
            done
        echo "=== Monolith size ==="
        monolith="src/Sharpy.Stdlib/bin/Debug/net10.0/Sharpy.Stdlib.dll"
        if [ -f "$monolith" ]; then
          size=$(stat --format="%s" "$monolith" 2>/dev/null || stat -f "%z" "$monolith" 2>/dev/null)
          printf "  %-40s %s bytes\n" "$(basename "$monolith")" "$size"
        fi
