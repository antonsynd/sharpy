site_name: Sharpy
site_url: https://antonsynd.github.io/sharpy/
site_description: A statically-typed Pythonic language for .NET
repo_url: https://github.com/antonsynd/sharpy
repo_name: antonsynd/sharpy

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list
  - tables

plugins:
  - search

exclude_docs: |
  audits/
  rejected_proposals/
  completed_plans/
  implementation_planning/

