# Clippy configuration for Sharpy compiler toolchain
# https://doc.rust-lang.org/clippy/configuration.html

# Set the maximum cognitive complexity for functions
cognitive-complexity-threshold = 30

# Allow some common patterns in compiler code
# You can disable specific lints here if they're too noisy for your use case

# Set the maximum number of lines for a function
too-many-lines-threshold = 100

# Set the maximum number of arguments for a function
too-many-arguments-threshold = 8

# Single character binding names threshold
single-char-binding-names-threshold = 4
